name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (frontend)
        run: npx tsc --noEmit

      - name: Type check (engine)
        run: cd engine && npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests (engine)
        run: cd engine && npx vitest run
